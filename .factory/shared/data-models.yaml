# Shared Domain Models — Platform-Neutral Definitions
# All platform droids read this to generate their native model classes.
# Update this file FIRST, then propagate to each platform.

models:
  User:
    description: "Application user account"
    fields:
      id: { type: uuid, required: true, generated: true }
      email: { type: string, format: email, required: true, unique: true, maxLength: 255 }
      username: { type: string, required: true, unique: true, minLength: 3, maxLength: 50 }
      displayName: { type: string, maxLength: 100 }
      passwordHash: { type: string, internal: true, description: "Never exposed via API" }
      role: { type: enum, values: [admin, editor, viewer], default: viewer }
      avatarUrl: { type: string, format: uri, nullable: true }
      isActive: { type: boolean, default: true }
      lastLoginAt: { type: datetime, nullable: true }
      createdAt: { type: datetime, generated: true }
      updatedAt: { type: datetime, generated: true }
    platform_mapping:
      kotlin: "data class User"
      swift: "struct User: Codable, Identifiable"
      typescript: "interface User"
      python: "class User(BaseModel)"
      sql: "CREATE TABLE users"

  Product:
    description: "Nutritional product / ingredient"
    fields:
      id: { type: uuid, required: true, generated: true }
      name: { type: string, required: true, maxLength: 200 }
      description: { type: string, nullable: true, maxLength: 1000 }
      weight: { type: decimal, required: true, min: 0, description: "Weight in grams" }
      calories: { type: decimal, required: true, min: 0, description: "Energy in kcal" }
      protein: { type: decimal, required: true, min: 0, description: "Protein in grams" }
      fat: { type: decimal, required: true, min: 0, description: "Fat in grams" }
      carbs: { type: decimal, required: true, min: 0, description: "Carbohydrates in grams" }
      fiber: { type: decimal, min: 0, default: 0, description: "Fiber in grams" }
      createdBy: { type: uuid, ref: User }
      createdAt: { type: datetime, generated: true }
      updatedAt: { type: datetime, generated: true }
    platform_mapping:
      kotlin: "data class Product"
      swift: "struct Product: Codable, Identifiable"
      typescript: "interface Product"
      python: "class Product(BaseModel)"
      sql: "CREATE TABLE products"

  Recipe:
    description: "Cooking recipe with ingredients and instructions"
    fields:
      id: { type: uuid, required: true, generated: true }
      name: { type: string, required: true, maxLength: 300 }
      description: { type: string, nullable: true, description: "Rich text / HTML content" }
      preparationTime: { type: integer, min: 1, description: "Time in minutes" }
      portions: { type: integer, min: 1, default: 1 }
      difficulty: { type: enum, values: [easy, medium, hard], default: medium }
      imageUrl: { type: string, format: uri, nullable: true }
      ingredients: { type: array, items: RecipeIngredient }
      createdBy: { type: uuid, ref: User }
      createdAt: { type: datetime, generated: true }
      updatedAt: { type: datetime, generated: true }
    platform_mapping:
      kotlin: "data class Recipe"
      swift: "struct Recipe: Codable, Identifiable"
      typescript: "interface Recipe"
      python: "class Recipe(BaseModel)"
      sql: "CREATE TABLE recipes"

  RecipeIngredient:
    description: "Join between Recipe and Product with amount"
    fields:
      id: { type: uuid, required: true, generated: true }
      recipeId: { type: uuid, ref: Recipe, required: true }
      productId: { type: uuid, ref: Product, required: true }
      amount: { type: decimal, required: true, min: 0, description: "Amount in grams" }
      unit: { type: enum, values: [g, ml, piece, tbsp, tsp, cup], default: g }
    platform_mapping:
      kotlin: "data class RecipeIngredient"
      swift: "struct RecipeIngredient: Codable"
      typescript: "interface RecipeIngredient"
      python: "class RecipeIngredient(BaseModel)"
      sql: "CREATE TABLE recipe_ingredients"

enums:
  UserRole:
    values: [admin, editor, viewer]
    description: "User permission level"
  Difficulty:
    values: [easy, medium, hard]
    description: "Recipe difficulty level"
  Unit:
    values: [g, ml, piece, tbsp, tsp, cup]
    description: "Measurement unit for ingredients"
